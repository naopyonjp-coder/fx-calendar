<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FX収支" />
  <title>FX収支カレンダー</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">FX PROFIT TRACKER</p>
        <h1>FX収支カレンダー</h1>
      </div>
      <button class="install-help" id="installHelp" type="button" hidden>ホーム追加</button>
    </header>


    <section class="quote-card" aria-label="今日の投資格言">
      <div>
        <p class="eyebrow">FAMOUS INVESTOR WISDOM</p>
        <p id="quoteText" class="quote-text">----</p>
        <p id="quoteAuthor" class="quote-author">----</p>
      </div>
      <button id="quoteShuffle" type="button" class="quote-button" aria-label="格言を入れ替える">↻</button>
    </section>

    <section class="month-switcher" aria-label="月の切り替え">
      <button id="prevMonth" type="button" aria-label="前の月へ">‹</button>
      <h2 id="monthTitle">----</h2>
      <button id="nextMonth" type="button" aria-label="次の月へ">›</button>
    </section>

    <section class="summary-grid" aria-label="収支サマリー">
      <article class="summary-card primary">
        <p>月別合計</p>
        <strong id="monthNet">¥0</strong>
        <span id="monthBreakdown">勝ち ¥0 / 負け ¥0</span>
      </article>
      <article class="summary-card">
        <p>年別合計</p>
        <strong id="yearNet">¥0</strong>
        <span id="yearBreakdown">勝ち ¥0 / 負け ¥0</span>
      </article>
    </section>

    <section class="calendar-card">
      <div class="weekdays" aria-hidden="true">
        <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
      </div>
      <div id="calendar" class="calendar" aria-label="収支カレンダー"></div>
    </section>

    <section class="entry-panel" aria-label="選択日の入力">
      <div class="entry-title-row">
        <div>
          <p class="eyebrow">SELECTED DAY</p>
          <h3 id="selectedDateTitle">日付を選択</h3>
        </div>
        <button id="todayBtn" type="button" class="ghost-button">今日</button>
      </div>

      <div class="input-grid">
        <label>
          <span>勝ち金額</span>
          <input id="winInput" type="number" inputmode="numeric" min="0" placeholder="例：5000" />
        </label>
        <label>
          <span>負け金額</span>
          <input id="lossInput" type="number" inputmode="numeric" min="0" placeholder="例：2000" />
        </label>
      </div>

      <div class="daily-result">
        <span>この日の収支</span>
        <strong id="dayNet">¥0</strong>
      </div>

      <div class="action-row">
        <button id="saveEntry" class="main-button" type="button">保存</button>
        <button id="clearEntry" class="danger-button" type="button">クリア</button>
      </div>
    </section>

    <section class="data-panel" aria-label="データ管理">
      <details>
        <summary>データ管理</summary>
        <p>データはこの端末のブラウザ内に保存されます。機種変更前はバックアップをおすすめします。</p>
        <div class="action-row small">
          <button id="exportData" type="button" class="ghost-button">バックアップ</button>
          <label class="import-label">
            復元
            <input id="importData" type="file" accept="application/json" />
          </label>
        </div>
      </details>
    </section>
  </main>

  <dialog id="helpDialog" class="help-dialog">
    <h2>ホーム画面に追加</h2>
    <p>iPhoneの場合はSafariでこのページを開き、共有ボタンから「ホーム画面に追加」を選びます。</p>
    <button id="closeHelp" type="button" class="main-button">OK</button>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
